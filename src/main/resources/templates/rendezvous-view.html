<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.rendezvous})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 page-header">
        <h1 th:text="#{nav.rendezvous}">Rendez-vous</h1>
        <a class="btn btn-primary" th:href="@{/rendezvous/create}" th:text="#{action.new}">Nouveau</a>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-bordered mb-0">
            <thead>
            <tr>
                <th th:text="#{label.id}">Id</th>
                <th th:text="#{label.medecin}">Medecin</th>
                <th th:text="#{label.patient}">Patient</th>
                <th th:text="#{label.motif}">Motif</th>
                <th th:text="#{label.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.id}">1</td>
                <td th:text="${row.medecin != null ? row.medecin.nomComplet : ''}">Medecin</td>
                <td th:text="${row.patient != null ? row.patient.nom : ''}">Patient</td>
                <td th:text="${row.motif}">Motif</td>
                <td th:replace="~{fragments/table-actions :: cell(null, @{/rendezvous/{id}/delete(id=${row.id})})}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(rows)}">
                <td colspan="5" th:text="#{empty}">Aucune donnee</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
