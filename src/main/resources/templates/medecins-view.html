<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.medecins})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 page-header">
        <h1 th:text="#{nav.medecins}">Medecins</h1>
        <a class="btn btn-primary" th:href="@{/medecins/create}" th:text="#{action.new}">Nouveau</a>
    </div>
    <form class="row g-2 mb-3" method="get" th:action="@{/medecins}">
        <div class="col-auto flex-grow-1">
            <input class="form-control" name="keyword" th:value="${keyword}" th:placeholder="#{keyword}"/>
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-primary" type="submit" th:text="#{action.search}">Rechercher</button>
        </div>
    </form>
    <div class="table-responsive">
        <table class="table table-striped table-bordered mb-0">
            <thead>
            <tr>
                <th th:text="#{label.id}">Id</th>
                <th th:text="#{label.nomComplet}">Nom</th>
                <th th:text="#{label.etablissement}">Etablissement</th>
                <th th:text="#{label.email}">Email</th>
                <th th:text="#{label.anneesExperience}">Experience</th>
                <th th:text="#{label.specialite}">Specialite</th>
                <th th:text="#{label.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.id}">1</td>
                <td th:text="${row.nomComplet}">Nom</td>
                <td th:text="${row.etablissement}">Etablissement</td>
                <td th:text="${row.email}">Email</td>
                <td th:text="${row.anneesExperience}">0</td>
                <td th:text="${row.specialite != null ? row.specialite.libelle : ''}">Specialite</td>
                <td th:replace="~{fragments/table-actions :: cell(@{/medecins/{id}/edit(id=${row.id})}, @{/medecins/{id}/delete(id=${row.id})})}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(rows)}">
                <td colspan="7" th:text="#{empty}">Aucune donnee</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
