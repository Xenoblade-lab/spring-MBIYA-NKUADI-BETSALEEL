<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.specialites})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-2 page-header">
        <h1 th:text="#{nav.specialites}">Specialites</h1>
        <a class="btn btn-primary" th:href="@{/specialites/create}" th:text="#{action.new}">Nouveau</a>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-bordered mb-0">
            <thead>
            <tr>
                <th th:text="#{label.id}">Id</th>
                <th th:text="#{label.libelle}">Libelle</th>
                <th th:text="#{label.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.id}">1</td>
                <td th:text="${row.libelle}">Libelle</td>
                <td th:replace="~{fragments/table-actions :: cell(@{/specialites/{id}/edit(id=${row.id})}, @{/specialites/{id}/delete(id=${row.id})})}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(rows)}">
                <td colspan="3" th:text="#{empty}">Aucune donnee</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
