<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.clients})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <h1 class="page-header" th:text="#{nav.clients}">Client</h1>
    <form th:action="@{/clients/save}" th:object="${form}" method="post" class="card card-body">
        <input type="hidden" name="id" th:value="${id}"/>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.categorie}">Catégorie</label>
            <select class="form-select" th:field="*{categoriePk}">
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.libelle}"></option>
            </select>
            <div class="form-error" th:if="${#fields.hasErrors('categoriePk')}" th:errors="*{categoriePk}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.nomComplet}">Nom complet</label>
            <input class="form-control" th:field="*{nomComplet}" maxlength="100"/>
            <div class="form-error" th:if="${#fields.hasErrors('nomComplet')}" th:errors="*{nomComplet}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.quartier}">Quartier</label>
            <input class="form-control" th:field="*{quartier}" maxlength="45"/>
            <div class="form-error" th:if="${#fields.hasErrors('quartier')}" th:errors="*{quartier}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.email}">Email</label>
            <input class="form-control" type="email" th:field="*{email}" maxlength="80"/>
            <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.pointsFidelite}">Points fidélité</label>
            <input class="form-control" type="number" th:field="*{pointsFidelite}" min="1"/>
            <div class="form-error" th:if="${#fields.hasErrors('pointsFidelite')}" th:errors="*{pointsFidelite}"></div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit" th:text="#{action.save}">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/clients}" th:text="#{action.cancel}">Annuler</a>
        </div>
    </form>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
