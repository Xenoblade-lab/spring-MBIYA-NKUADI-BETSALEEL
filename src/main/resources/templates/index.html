<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.home})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>

    <section class="hero-section text-center mb-5">
        <div class="hero-badge mb-3">
            <i class="bi bi-cup-hot me-1"></i> Cuisine congolaise
        </div>
        <h1 class="hero-title" th:text="#{home.welcome}">Restaurant Mbiya</h1>
        <p class="hero-subtitle" th:text="#{home.subtitle}">Sous-titre</p>
        <a class="btn btn-primary btn-lg hero-cta mt-2" th:href="@{/plats}">
            <i class="bi bi-menu-button-wide me-2"></i><span th:text="#{home.hero.cta}">Voir la carte</span>
        </a>
    </section>

    <div class="row g-4">
        <div class="col-12 col-sm-6 col-lg-3">
            <a class="dashboard-card card h-100 text-decoration-none" th:href="@{/categories}">
                <div class="card-body">
                    <div class="dashboard-icon categories-icon">
                        <i class="bi bi-award"></i>
                    </div>
                    <h2 class="dashboard-title" th:text="#{nav.categories}">Catégories</h2>
                    <p class="dashboard-desc" th:text="#{card.categories.desc}">Fidélité</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
            <a class="dashboard-card card h-100 text-decoration-none" th:href="@{/clients}">
                <div class="card-body">
                    <div class="dashboard-icon clients-icon">
                        <i class="bi bi-people"></i>
                    </div>
                    <h2 class="dashboard-title" th:text="#{nav.clients}">Clients</h2>
                    <p class="dashboard-desc" th:text="#{card.clients.desc}">Fidèles</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
            <a class="dashboard-card card h-100 text-decoration-none" th:href="@{/plats}">
                <div class="card-body">
                    <div class="dashboard-icon plats-icon">
                        <i class="bi bi-egg-fried"></i>
                    </div>
                    <h2 class="dashboard-title" th:text="#{nav.plats}">Plats</h2>
                    <p class="dashboard-desc" th:text="#{card.plats.desc}">Menu</p>
                </div>
            </a>
        </div>
        <div class="col-12 col-sm-6 col-lg-3">
            <a class="dashboard-card card h-100 text-decoration-none" th:href="@{/commandes}">
                <div class="card-body">
                    <div class="dashboard-icon commandes-icon">
                        <i class="bi bi-receipt"></i>
                    </div>
                    <h2 class="dashboard-title" th:text="#{nav.commandes}">Commandes</h2>
                    <p class="dashboard-desc" th:text="#{card.commandes.desc}">Avis clients</p>
                </div>
            </a>
        </div>
    </div>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
