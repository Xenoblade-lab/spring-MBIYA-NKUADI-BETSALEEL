<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(#{nav.medecins})}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<main class="container pb-5">
    <div th:replace="~{fragments/alerts :: alerts}"></div>
    <h1 class="page-header" th:text="#{nav.medecins}">Medecin</h1>
    <form th:action="@{/medecins/save}" th:object="${form}" method="post" class="card card-body">
        <input type="hidden" name="id" th:value="${id}"/>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.specialite}">Specialite</label>
            <select class="form-select" th:field="*{specialitePk}">
                <option th:each="s : ${specialites}" th:value="${s.id}" th:text="${s.libelle}"></option>
            </select>
            <div class="form-error" th:if="${#fields.hasErrors('specialitePk')}" th:errors="*{specialitePk}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.nomComplet}">Nom complet</label>
            <input class="form-control" th:field="*{nomComplet}" maxlength="100"/>
            <div class="form-error" th:if="${#fields.hasErrors('nomComplet')}" th:errors="*{nomComplet}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.etablissement}">Etablissement</label>
            <input class="form-control" th:field="*{etablissement}" maxlength="45"/>
            <div class="form-error" th:if="${#fields.hasErrors('etablissement')}" th:errors="*{etablissement}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.email}">Email</label>
            <input class="form-control" type="email" th:field="*{email}" maxlength="80"/>
            <div class="form-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" th:text="#{label.anneesExperience}">Annees d experience</label>
            <input class="form-control" type="number" th:field="*{anneesExperience}" min="1"/>
            <div class="form-error" th:if="${#fields.hasErrors('anneesExperience')}" th:errors="*{anneesExperience}"></div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit" th:text="#{action.save}">Enregistrer</button>
            <a class="btn btn-secondary" th:href="@{/medecins}" th:text="#{action.cancel}">Annuler</a>
        </div>
    </form>
</main>
<div th:replace="~{fragments/scripts :: scripts}"></div>
</body>
</html>
